<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>LocalLead AI</title>
  <meta name="theme-color" content="#0f4fe8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="LocalLead AI" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#f4f7fb;
      --bg2:#eaf1ff;
      --card:#ffffff;
      --card2:rgba(255,255,255,.72);
      --ink:#101828;
      --muted:#5e6b7d;
      --soft:#eef4ff;
      --line:#d9e2f1;
      --brand:#0f4fe8;
      --brand2:#00a6d6;
      --brand3:#6c47ff;
      --good:#067647;
      --good-bg:#ecfdf3;
      --warn:#b54708;
      --warn-bg:#fffaeb;
      --bad:#b42318;
      --bad-bg:#fef3f2;
      --shadow:0 18px 48px rgba(16,24,40,.10);
      --shadow2:0 8px 22px rgba(16,24,40,.07);
      --radius:24px;
      --focus:0 0 0 4px rgba(15,79,232,.18);
      color-scheme:light;
    }
    [data-theme="dark"]{
      --bg:#0b1220;
      --bg2:#111b2f;
      --card:#121b2d;
      --card2:rgba(18,27,45,.78);
      --ink:#f8fafc;
      --muted:#b7c2d6;
      --soft:#182641;
      --line:#273650;
      --brand:#6ea8ff;
      --brand2:#39d4ff;
      --brand3:#a893ff;
      --good:#75e0a7;
      --good-bg:#073c28;
      --warn:#ffd166;
      --warn-bg:#3a2a04;
      --bad:#ff9b92;
      --bad-bg:#3a1110;
      --shadow:0 18px 48px rgba(0,0,0,.34);
      --shadow2:0 8px 22px rgba(0,0,0,.28);
      color-scheme:dark;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    @media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}*,*::before,*::after{animation:none!important;transition:none!important}}
    body{
      margin:0;
      min-height:100vh;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Segoe UI,Roboto,Helvetica,Arial,sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top left, rgba(15,79,232,.20), transparent 34rem),
        radial-gradient(circle at top right, rgba(0,166,214,.18), transparent 32rem),
        linear-gradient(180deg,var(--bg2) 0%,var(--bg) 260px);
      -webkit-font-smoothing:antialiased;
      padding-bottom:calc(94px + env(safe-area-inset-bottom));
    }
    a,button,input,select,textarea{font:inherit}
    button,.btn{
      appearance:none;
      min-height:46px;
      border:0;
      background:linear-gradient(135deg,var(--brand),var(--brand2));
      color:white;
      padding:12px 15px;
      border-radius:16px;
      font-weight:850;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      text-decoration:none;
      box-shadow:0 12px 22px rgba(15,79,232,.18);
    }
    button:hover,.btn:hover{filter:saturate(1.08)}
    button:active,.btn:active{transform:translateY(1px)}
    button:focus-visible,.btn:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:none;box-shadow:var(--focus)}
    .secondary{background:var(--soft)!important;color:var(--brand)!important;box-shadow:none!important}
    .ghost{background:transparent!important;color:var(--ink)!important;border:1px solid var(--line)!important;box-shadow:none!important}
    .danger{background:var(--bad-bg)!important;color:var(--bad)!important;box-shadow:none!important}
    .success{background:var(--good-bg)!important;color:var(--good)!important;box-shadow:none!important}
    .full{width:100%}
    .tiny{min-height:36px;padding:8px 10px;border-radius:12px;font-size:12px}
    .app{max-width:540px;margin:0 auto;min-height:100vh;position:relative}
    header{
      padding:calc(16px + env(safe-area-inset-top)) 16px 12px;
      position:sticky;top:0;z-index:20;
      background:rgba(244,247,251,.72);
      backdrop-filter:saturate(180%) blur(18px);
      border-bottom:1px solid color-mix(in srgb,var(--line),transparent 30%);
    }
    [data-theme="dark"] header{background:rgba(11,18,32,.72)}
    .topline{display:flex;align-items:center;gap:12px}
    .logo{
      width:44px;height:44px;border-radius:16px;
      background:linear-gradient(145deg,var(--brand),var(--brand2));
      display:grid;place-items:center;color:white;font-weight:950;
      box-shadow:0 12px 26px rgba(15,79,232,.27);
      letter-spacing:-.5px;
    }
    h1{font-size:24px;line-height:1.05;margin:0;letter-spacing:-.8px}
    .subtitle{font-size:13px;color:var(--muted);margin-top:4px}
    main{padding:16px 16px 26px}
    .screen{display:none}.screen.active{display:block}
    .row{display:flex;align-items:center;gap:12px}.grow{flex:1}.between{justify-content:space-between}.wrap{flex-wrap:wrap}
    .muted{color:var(--muted)}.small{font-size:12px}.medium{font-size:14px}.strong{font-weight:850}
    .skip-link{
      position:absolute;left:14px;top:-60px;background:var(--ink);color:var(--bg);
      padding:10px 12px;border-radius:12px;z-index:100;
    }
    .skip-link:focus{top:14px}
    .hero{
      position:relative;overflow:hidden;
      padding:20px;border-radius:30px;
      background:
        linear-gradient(135deg,rgba(15,79,232,.16),rgba(0,166,214,.10)),
        var(--card2);
      border:1px solid color-mix(in srgb,var(--brand),transparent 84%);
      box-shadow:var(--shadow);
    }
    .hero::after{
      content:"";position:absolute;right:-40px;top:-48px;width:150px;height:150px;border-radius:50%;
      background:linear-gradient(135deg,rgba(0,166,214,.30),rgba(108,71,255,.22));
      filter:blur(2px);
    }
    .hero h2{margin:0 0 8px;font-size:27px;line-height:1.05;letter-spacing:-.9px;position:relative;z-index:1}
    .hero p{margin:0;color:var(--muted);line-height:1.48;position:relative;z-index:1}
    .quick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;position:relative;z-index:1}
    .chip{
      border:1px solid var(--line);background:var(--card2);
      padding:8px 10px;border-radius:999px;font-size:12px;font-weight:800;color:var(--muted);
      display:inline-flex;align-items:center;gap:6px;
    }
    .section-title{font-size:18px;margin:24px 2px 10px;letter-spacing:-.25px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .metric,.card{
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow2);
    }
    .metric{padding:15px}
    .metric b{display:block;font-size:29px;margin:7px 0 2px;letter-spacing:-.8px}
    .metric span{font-size:12px;color:var(--muted)}
    .card{padding:15px;margin-bottom:10px}
    .insight-card{
      background:
        linear-gradient(135deg,rgba(108,71,255,.13),rgba(0,166,214,.10)),
        var(--card2);
    }
    .avatar{
      width:46px;height:46px;border-radius:17px;background:var(--soft);
      display:grid;place-items:center;color:var(--brand);font-weight:950;
      flex:0 0 auto;
    }
    .lead-card{cursor:pointer;transition:transform .15s ease, box-shadow .15s ease}
    .lead-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
    .status{
      font-size:11px;font-weight:900;padding:7px 9px;border-radius:999px;white-space:nowrap;
      border:1px solid transparent;
    }
    .s-新查詢{background:var(--soft);color:var(--brand)}
    .s-已回覆{background:#f4f3ff;color:#6941c6}
    .s-已約試堂\/預約{background:var(--warn-bg);color:var(--warn)}
    .s-已出席{background:#ecfeff;color:#0e7490}
    .s-已報名\/成交{background:var(--good-bg);color:var(--good)}
    .s-未回覆{background:var(--bad-bg);color:var(--bad)}
    .s-放棄{background:var(--soft);color:var(--muted)}
    .toolbar{display:flex;gap:10px;margin:8px 0 12px}.toolbar input{flex:1}
    input,select,textarea{
      width:100%;
      border:1px solid var(--line);
      background:var(--card);
      color:var(--ink);
      padding:13px 12px;
      border-radius:16px;
      outline:none;
      min-height:46px;
    }
    textarea{min-height:102px;resize:vertical}
    label{font-size:12px;font-weight:900;color:var(--muted);display:block;margin:12px 0 6px}
    .form-grid{display:grid;gap:4px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .bottom-nav{
      position:fixed;left:50%;bottom:0;transform:translateX(-50%);
      width:100%;max-width:540px;
      padding:10px 10px calc(10px + env(safe-area-inset-bottom));
      background:rgba(255,255,255,.92);backdrop-filter:blur(22px);
      border-top:1px solid var(--line);
      display:grid;grid-template-columns:repeat(5,1fr);gap:5px;z-index:30;
    }
    [data-theme="dark"] .bottom-nav{background:rgba(18,27,45,.92)}
    .navbtn{
      background:transparent!important;color:var(--muted)!important;box-shadow:none!important;
      border-radius:18px;padding:9px 3px;display:grid;gap:3px;font-size:10px;min-height:58px;
    }
    .navbtn b{font-size:20px;line-height:1}
    .navbtn.active{background:var(--soft)!important;color:var(--brand)!important}
    .modal{position:fixed;inset:0;background:rgba(16,24,40,.48);display:none;align-items:flex-end;z-index:80}
    .modal.active{display:flex}
    .sheet{
      background:var(--bg);width:100%;max-width:540px;margin:0 auto;
      border-radius:30px 30px 0 0;padding:16px;max-height:88vh;overflow:auto;
      box-shadow:0 -22px 70px rgba(0,0,0,.28);
    }
    .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .empty{text-align:center;color:var(--muted);padding:25px;border:1px dashed var(--line);border-radius:22px;background:var(--card2)}
    .bar{height:11px;background:var(--soft);border-radius:999px;overflow:hidden;margin-top:8px}
    .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:999px}
    .up{color:var(--good);font-weight:950}.down{color:var(--bad);font-weight:950}.flat{color:var(--warn);font-weight:950}
    .mini-table{width:100%;border-collapse:collapse;font-size:13px}
    .mini-table td{padding:10px 0;border-bottom:1px solid var(--line)}
    .mini-table td:last-child{text-align:right;font-weight:850}
    .kpi-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}
    .report{white-space:pre-wrap;line-height:1.55}
    .install,.notice{
      font-size:13px;line-height:1.45;color:var(--muted);
      background:var(--warn-bg);border:1px solid color-mix(in srgb,var(--warn),transparent 70%);
      border-radius:18px;padding:12px;margin-top:10px;
    }
    .notice strong{color:var(--ink)}
    .login-wrap{
      min-height:100vh;
      display:grid;place-items:center;
      padding:calc(26px + env(safe-area-inset-top)) 18px calc(26px + env(safe-area-inset-bottom));
    }
    .login-card{
      width:100%;max-width:450px;border:1px solid var(--line);background:var(--card2);
      border-radius:32px;padding:22px;box-shadow:var(--shadow);
    }
    .login-logo{
      width:62px;height:62px;border-radius:22px;background:linear-gradient(145deg,var(--brand),var(--brand2));
      color:white;display:grid;place-items:center;font-size:22px;font-weight:950;margin-bottom:16px;
    }
    .pin-dots{display:flex;gap:8px;justify-content:center;margin:12px 0}
    .pin-dots span{width:10px;height:10px;border-radius:50%;background:var(--line)}
    .pin-dots span.on{background:var(--brand)}
    .locked .app{display:none}
    body:not(.locked) #loginScreen{display:none}
    .toast{
      position:fixed;left:50%;bottom:calc(105px + env(safe-area-inset-bottom));transform:translateX(-50%);
      background:var(--ink);color:var(--bg);padding:11px 13px;border-radius:999px;font-weight:850;font-size:13px;
      box-shadow:var(--shadow);z-index:120;display:none;max-width:92%;text-align:center;
    }
    .toast.show{display:block}
    .sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
    .textarea-mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;min-height:170px}
    @media (max-width:360px){.grid,.quick{grid-template-columns:1fr}.hero h2{font-size:24px}}
    @media (min-width:780px){
      body{padding-bottom:24px}
      .bottom-nav{position:sticky;bottom:12px;transform:none;left:auto;margin:0 auto;border-radius:26px;border:1px solid var(--line);box-shadow:var(--shadow)}
      .app{padding-bottom:22px}
    }
  </style>
</head>

<body class="locked">
<a class="skip-link" href="#mainContent">Skip to main content</a>

<section id="loginScreen" class="login-wrap" aria-label="Login">
  <div class="login-card">
    <div class="login-logo" aria-hidden="true">LL</div>
    <h1 id="loginTitle">LocalLead AI</h1>
    <p class="muted">Business CRM · AI follow-up · monthly analysis</p>
    <div id="loginBody"></div>
  </div>
</section>

<div class="app" aria-live="polite">
  <header>
    <div class="topline">
      <div class="logo" aria-hidden="true">LL</div>
      <div class="grow">
        <h1>LocalLead AI</h1>
        <div class="subtitle" id="headerSub">Business CRM · Local login enabled</div>
      </div>
      <button class="secondary" onclick="openLeadForm()" aria-label="Add new lead">＋</button>
    </div>
  </header>

  <main id="mainContent">
    <section id="dashboard" class="screen active" aria-label="Dashboard"></section>
    <section id="leads" class="screen" aria-label="Leads"></section>
    <section id="templates" class="screen" aria-label="Message templates"></section>
    <section id="report" class="screen" aria-label="Business analysis"></section>
    <section id="settings" class="screen" aria-label="Settings"></section>
  </main>

  <nav class="bottom-nav" aria-label="Main navigation">
    <button class="navbtn active" data-tab="dashboard" aria-label="Dashboard"><b aria-hidden="true">▣</b>Home</button>
    <button class="navbtn" data-tab="leads" aria-label="Leads"><b aria-hidden="true">☷</b>Leads</button>
    <button class="navbtn" data-tab="templates" aria-label="Message templates"><b aria-hidden="true">✉</b>Scripts</button>
    <button class="navbtn" data-tab="report" aria-label="Business analysis"><b aria-hidden="true">▤</b>Analysis</button>
    <button class="navbtn" data-tab="settings" aria-label="Settings"><b aria-hidden="true">⚙</b>Settings</button>
  </nav>
</div>

<div id="modal" class="modal" onclick="closeModalIfBackdrop(event)" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="sheet">
    <div class="sheet-head">
      <h2 id="modalTitle" style="margin:0">新增 Lead</h2>
      <button class="ghost" onclick="closeModal()">關閉</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div id="toast" class="toast" role="status"></div>

<script>
const APP_VERSION = '3.0-accessible-login';
const STORAGE_KEY = 'localleadai.pwa.leads.v3';
const OLD_STORAGE_KEY = 'localleadai.pwa.leads.v1';
const SETTINGS_KEY = 'localleadai.pwa.settings.v3';
const BENCHMARK_KEY = 'localleadai.pwa.benchmarks.v3';
const AUTH_KEY = 'localleadai.pwa.auth.v3';
const SESSION_KEY = 'localleadai.pwa.session.v3';
const STAFF_KEY = 'localleadai.pwa.staff.v3';

const STATUS = ['新查詢','已回覆','已約試堂/預約','已出席','已報名/成交','未回覆','放棄'];
const SOURCES = ['WhatsApp','Instagram','Facebook','Website/Form','Referral','Walk-in'];
const CATEGORIES = ['補習社 / Education','美容 / Nail / Salon','健身 / Wellness','車房 / Auto Service','餐飲 / F&B','寵物服務','地產 / Property','其他 Local Service'];
const DEFAULT_BENCHMARKS = {
 '補習社 / Education':{conversion:18,responseHours:2.5,avgLeadValue:1800,followUpRate:82,monthlyLeadGrowth:6},
 '美容 / Nail / Salon':{conversion:22,responseHours:1.5,avgLeadValue:680,followUpRate:78,monthlyLeadGrowth:5},
 '健身 / Wellness':{conversion:15,responseHours:3,avgLeadValue:1200,followUpRate:74,monthlyLeadGrowth:4},
 '車房 / Auto Service':{conversion:20,responseHours:2,avgLeadValue:1500,followUpRate:70,monthlyLeadGrowth:3},
 '餐飲 / F&B':{conversion:10,responseHours:4,avgLeadValue:450,followUpRate:62,monthlyLeadGrowth:2},
 '寵物服務':{conversion:19,responseHours:2,avgLeadValue:900,followUpRate:76,monthlyLeadGrowth:5},
 '地產 / Property':{conversion:7,responseHours:1,avgLeadValue:8000,followUpRate:88,monthlyLeadGrowth:4},
 '其他 Local Service':{conversion:16,responseHours:2.5,avgLeadValue:1200,followUpRate:72,monthlyLeadGrowth:4}
};
const TEMPLATES = [
 {title:'新查詢快速回覆',cat:'All',body:'你好，多謝查詢 😊 想幫你安排最合適嘅服務，麻煩你提供需要嘅項目、理想時間同預算，我哋會盡快回覆。'},
 {title:'24 小時跟進',cat:'All',body:'你好，想跟進返你之前嘅查詢。我哋仲有少量時段 / 名額，可以幫你預留。你想今日定聽日確認比較方便？'},
 {title:'補習試堂前提醒',cat:'Education',body:'提提你，明日有試堂安排，到時見 😊 地址係：[地址]。如需要改時間，可以提前 WhatsApp 我哋。'},
 {title:'試堂後報名跟進',cat:'Education',body:'多謝今日嚟試堂。老師初步建議可以先集中改善 [重點]。如果想報名，我哋可以幫你安排下星期開始上堂。'},
 {title:'美容問價回覆',cat:'Beauty',body:'你好，可以呀。想幫你報準啲價，可以 send 你想做嘅款式 / 服務同想約日期時間俾我哋，我哋會盡快回覆可預約時段。'},
 {title:'車房報價資料收集',cat:'Auto',body:'你好，可以幫你報價。麻煩你 send 車款、年份、需要處理嘅問題相片 / 輪呔尺寸，同埋想今日定預約其他日子。'}
];

let active = 'dashboard';
let query = '';
let filter = '全部';
let leads = loadLeads();
let settings = loadSettings();
let benchmarks = loadBenchmarks();
let staff = loadStaff();

function uid(){ return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()+Math.random()); }
function addDays(n){ const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,16); }
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;' }[m]));}
function todayStart(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function tomorrowStart(){ const d=todayStart(); d.setDate(d.getDate()+1); return d; }
function fmt(dt){ return new Date(dt).toLocaleString('zh-HK',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
function monthNow(){ return new Date().toISOString().slice(0,7); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }
function copyText(t){ navigator.clipboard?.writeText(t).then(()=>showToast('Copied')).catch(()=>showToast('Please copy manually')); }

function seed(){
 return [
  {id:uid(),createdAt:new Date().toISOString(),name:'陳太',phone:'91234567',source:'WhatsApp',interest:'中二英文試堂',levelOrType:'中二',preferredTime:'星期六下午',status:'新查詢',nextFollowUp:addDays(0),assignedTo:'Owner',valueHKD:1800,notes:'想改善 writing'},
  {id:uid(),createdAt:new Date().toISOString(),name:'李先生',phone:'98761234',source:'Instagram',interest:'小五數學',levelOrType:'小五',preferredTime:'平日 6pm',status:'已約試堂/預約',nextFollowUp:addDays(1),assignedTo:'Admin',valueHKD:1600,notes:'已約本週六試堂'},
  {id:uid(),createdAt:new Date().toISOString(),name:'王小姐',phone:'69998888',source:'Facebook',interest:'DSE Econ',levelOrType:'中五',preferredTime:'週末',status:'已回覆',nextFollowUp:addDays(-1),assignedTo:'Sales',valueHKD:2400,notes:'等家長確認時間'}
 ];
}
function loadLeads(){
 try{
   const modern = JSON.parse(localStorage.getItem(STORAGE_KEY));
   if(Array.isArray(modern)) return modern;
   const old = JSON.parse(localStorage.getItem(OLD_STORAGE_KEY));
   if(Array.isArray(old)){ localStorage.setItem(STORAGE_KEY, JSON.stringify(old)); return old; }
 }catch(e){}
 return seed();
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(leads)); render(); }
function loadSettings(){
 try{return {...{category:'補習社 / Education',month:monthNow(),theme:'light',businessName:'LocalLead AI Demo',ownerName:'Owner'}, ...(JSON.parse(localStorage.getItem(SETTINGS_KEY))||{})}}
 catch(e){return {category:'補習社 / Education',month:monthNow(),theme:'light',businessName:'LocalLead AI Demo',ownerName:'Owner'}}
}
function saveSettingsObj(s){ settings=s; localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); applyTheme(); render(); }
function loadBenchmarks(){ try{return JSON.parse(localStorage.getItem(BENCHMARK_KEY))||DEFAULT_BENCHMARKS}catch(e){return DEFAULT_BENCHMARKS}}
function saveBenchmarksObj(b){ benchmarks=b; localStorage.setItem(BENCHMARK_KEY, JSON.stringify(benchmarks)); render(); }

async function sha256(message){
 const msgBuffer = new TextEncoder().encode(message);
 const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
 return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function setupLogin(){
 const name = document.getElementById('setupName').value.trim() || 'LocalLead AI';
 const pin = document.getElementById('setupPin').value.trim();
 const pin2 = document.getElementById('setupPin2').value.trim();
 if(!/^\d{4,8}$/.test(pin)) return showToast('PIN must be 4-8 digits');
 if(pin!==pin2) return showToast('PIN does not match');
 const hash = await sha256(pin);
 localStorage.setItem(AUTH_KEY, JSON.stringify({enabled:true, hash, createdAt:new Date().toISOString()}));
 saveSettingsObj({...settings,businessName:name});
 sessionStorage.setItem(SESSION_KEY,'yes');
 unlockApp();
}
function skipLogin(){
 localStorage.setItem(AUTH_KEY, JSON.stringify({enabled:false, createdAt:new Date().toISOString()}));
 sessionStorage.setItem(SESSION_KEY,'yes');
 unlockApp();
}
async function login(){
 const pin = document.getElementById('loginPin')?.value.trim() || '';
 const auth = getAuth();
 if(!auth) return renderLogin();
 const hash = await sha256(pin);
 if(hash === auth.hash){ sessionStorage.setItem(SESSION_KEY,'yes'); unlockApp(); }
 else showToast('Wrong PIN');
}
function logout(){ sessionStorage.removeItem(SESSION_KEY); document.body.classList.add('locked'); renderLogin(); }
function unlockApp(){ document.body.classList.remove('locked'); document.getElementById('headerSub').textContent = `${settings.businessName || 'LocalLead AI'} · ${settings.category}`; render(); }
function forgotPin(){
 if(confirm('This local demo login cannot recover a forgotten PIN. Reset login only? Your lead data will stay.')){
   localStorage.removeItem(AUTH_KEY); sessionStorage.removeItem(SESSION_KEY); renderLogin();
 }
}
async function changePin(){
 const oldPin = prompt('Current PIN');
 if(oldPin === null) return;
 const auth = getAuth();
 if(auth?.enabled && await sha256(oldPin) !== auth.hash) return showToast('Current PIN wrong');
 const newPin = prompt('New 4-8 digit PIN');
 if(!/^\d{4,8}$/.test(newPin||'')) return showToast('PIN must be 4-8 digits');
 localStorage.setItem(AUTH_KEY, JSON.stringify({enabled:true, hash:await sha256(newPin), createdAt:auth?.createdAt||new Date().toISOString(), changedAt:new Date().toISOString()}));
 showToast('PIN changed');
}
function disableLogin(){
 if(confirm('Disable local PIN login on this device?')){
   localStorage.setItem(AUTH_KEY, JSON.stringify({enabled:false, createdAt:new Date().toISOString()}));
   showToast('Login disabled');
   render();
 }
}

function isActiveLead(l){return !['已報名/成交','放棄'].includes(l.status);}
function todayFollowUps(){ return leads.filter(l=>new Date(l.nextFollowUp)<=tomorrowStart() && isActiveLead(l)).sort((a,b)=>new Date(a.nextFollowUp)-new Date(b.nextFollowUp));}
function overdue(){ return leads.filter(l=>new Date(l.nextFollowUp)<todayStart() && isActiveLead(l));}
function won(){ return leads.filter(l=>l.status==='已報名/成交').length;}
function conversion(){ return leads.length ? Math.round(won()/leads.length*100) : 0;}
function potentialValue(){ return leads.filter(l=>l.status!=='放棄').reduce((s,l)=>s+(Number(l.valueHKD)||0),0);}
function badge(status){ return `<span class="status s-${esc(status).replaceAll('/','\\/')}">${esc(status)}</span>`; }
function healthScore(){
 let score=70;
 const due=todayFollowUps().length, late=overdue().length;
 if(conversion()>18) score+=12; else if(conversion()<8) score-=10;
 if(late>0) score-=Math.min(20,late*6);
 if(due>0) score+=5;
 if(potentialValue()>5000) score+=8;
 return Math.max(0,Math.min(100,score));
}

function monthKey(dt){return new Date(dt).toISOString().slice(0,7);}
function monthLeads(m=settings.month){return leads.filter(l=>monthKey(l.createdAt||new Date())===m);}
function previousMonth(m=settings.month){const [y,mo]=m.split('-').map(Number);const d=new Date(y,mo-2,1);return d.toISOString().slice(0,7);}
function monthMetrics(m=settings.month){
 const arr=monthLeads(m);
 const wonArr=arr.filter(l=>l.status==='已報名/成交');
 const activeArr=arr.filter(l=>l.status!=='放棄');
 const conv=arr.length?Math.round(wonArr.length/arr.length*100):0;
 const avgVal=arr.length?Math.round(activeArr.reduce((s,l)=>s+(Number(l.valueHKD)||0),0)/Math.max(activeArr.length,1)):0;
 const followRate=arr.length?Math.round(arr.filter(l=>l.nextFollowUp).length/arr.length*100):0;
 const sourceMap={}; arr.forEach(l=>sourceMap[l.source]=(sourceMap[l.source]||0)+1);
 const topSource=Object.entries(sourceMap).sort((a,b)=>b[1]-a[1])[0]?.[0]||'No data';
 return {count:arr.length,won:wonArr.length,conversion:conv,avgLeadValue:avgVal,followUpRate:followRate,topSource,potential:activeArr.reduce((s,l)=>s+(Number(l.valueHKD)||0),0)};
}
function arrow(v){return v>0?'▲':v<0?'▼':'—'}
function compareLine(label, mine, bench, suffix='', higherBetter=true){
 const diff=Math.round((mine-bench)*10)/10;
 const good=higherBetter?diff>=0:diff<=0;
 const cls=diff===0?'flat':good?'up':'down';
 const width=Math.max(4,Math.min(100, bench?Math.round(mine/bench*100):0));
 return `<div class="card"><div class="kpi-row"><div><div class="strong">${label}</div><div class="muted small">You: ${mine}${suffix} · category avg: ${bench}${suffix}</div><div class="bar"><i style="width:${width}%"></i></div></div><div class="${cls}">${arrow(diff)} ${Math.abs(diff)}${suffix}</div></div></div>`;
}
function businessAdvice(met, bench){
 const tips=[];
 if(met.count===0) tips.push('No leads for this month yet. Add or import enquiries first to make the analysis accurate.');
 if(met.conversion < bench.conversion) tips.push('Conversion is below category average. Shorten response time and follow up replied leads within 24 hours.');
 else tips.push('Conversion is above category average. Increase activity on your best-performing source.');
 if(met.followUpRate < bench.followUpRate) tips.push('Follow-up rate is low. Every active lead should have a next follow-up date.');
 if(met.avgLeadValue < bench.avgLeadValue) tips.push('Average lead value is below category. Try package bundles, deposits, premium options or monthly plans.');
 if(overdue().length>0) tips.push(`${overdue().length} lead(s) are overdue. Clear these before spending time on cold outreach.`);
 return tips;
}
function sourceBreakdown(arr=monthLeads()){
 const total=arr.length||1; const map={}; arr.forEach(l=>map[l.source]=(map[l.source]||0)+1);
 return Object.entries(map).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v} · ${Math.round(v/total*100)}%</td></tr>`).join('') || '<tr><td>No data</td><td>0</td></tr>';
}

async function forceRefreshApp(){
 try{
  if('serviceWorker' in navigator){ const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.unregister())); }
  if('caches' in window){ const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k))); }
 }catch(e){}
 location.reload(true);
}

  phone:document.getElementById('fPhone').value.trim(),
  source:document.getElementById('fSource').value,
  interest:document.getElementById('fInterest').value.trim(),
  levelOrType:document.getElementById('fLevel').value.trim(),
  preferredTime:document.getElementById('fTime').value.trim(),
  status:document.getElementById('fStatus').value,
  nextFollowUp:document.getElementById('fFollow').value||addDays(1),
  assignedTo:document.getElementById('fStaff').value,
  valueHKD:Number(document.getElementById('fValue').value)||0,
  notes:document.getElementById('fNotes').value.trim()
 };
 if(id){leads=leads.map(l=>l.id===id?obj:l)}else{leads.unshift(obj)}
 closeModal(); save(); showToast(id?'Lead updated':'Lead added');
}
function viewLead(id){
 const l=leads.find(x=>x.id===id); if(!l)return;
 const msg=`你好 ${l.name}，想跟進返你關於「${l.interest}」嘅查詢。我哋可以幫你安排最合適嘅時間 / 方案。你今日方便確認嗎？`;
 document.getElementById('modalTitle').textContent=l.name;
 document.getElementById('modalBody').innerHTML=`
  <div class="card"><div class="row between"><div><div class="strong">${esc(l.interest)}</div><div class="muted medium">${esc(l.phone)} · ${esc(l.source)}</div></div>${badge(l.status)}</div></div>
  <table class="mini-table">
   <tr><td>Level / Type</td><td>${esc(l.levelOrType||'-')}</td></tr>
   <tr><td>Preferred time</td><td>${esc(l.preferredTime||'-')}</td></tr>
   <tr><td>Assigned to</td><td>${esc(l.assignedTo||'-')}</td></tr>
   <tr><td>Next follow-up</td><td>${fmt(l.nextFollowUp)}</td></tr>
   <tr><td>Potential value</td><td>HK$${Number(l.valueHKD||0).toLocaleString()}</td></tr>
  </table>
  <h3 class="section-title">Notes</h3><div class="card muted medium">${esc(l.notes||'No notes')}</div>
  <h3 class="section-title">Suggested reply</h3><div class="card report">${esc(msg)}</div>
  <div class="actions"><button onclick='copyText(${JSON.stringify(msg)})'>Copy reply</button><button class="secondary" onclick="openLeadForm('${l.id}')">Edit</button><button class="ghost" onclick="closeModal()">Close</button></div>`;
 document.getElementById('modal').classList.add('active');
}
function deleteLead(id){ if(confirm('Delete this lead?')){leads=leads.filter(l=>l.id!==id);closeModal();save();showToast('Deleted')} }
function closeModal(){ document.getElementById('modal').classList.remove('active'); }
function closeModalIfBackdrop(e){ if(e.target.id==='modal') closeModal(); }
function downloadBackup(){
 const data={version:APP_VERSION,exportedAt:new Date().toISOString(),settings,benchmarks,staff,leads};
 const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
 const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`locallead-ai-backup-${new Date().toISOString().slice(0,10)}.json`; a.click();
}
function importBackup(e){
 const file=e.target.files[0]; if(!file)return;
 const reader=new FileReader();
 reader.onload=()=>{ try{
   const data=JSON.parse(reader.result);
   if(Array.isArray(data.leads)) leads=data.leads;
   if(data.settings) settings={...settings,...data.settings};
   if(data.benchmarks) benchmarks=data.benchmarks;
   if(Array.isArray(data.staff)) staff=data.staff;
   localStorage.setItem(STORAGE_KEY,JSON.stringify(leads));
   localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings));
   localStorage.setItem(BENCHMARK_KEY,JSON.stringify(benchmarks));
   localStorage.setItem(STAFF_KEY,JSON.stringify(staff));
   applyTheme(); render(); showToast('Imported');
 }catch(err){showToast('Import failed')} };
 reader.readAsText(file);
}
function resetDemo(){ if(confirm('Reset demo leads?')){leads=seed(); save();} }

if('serviceWorker' in navigator){ navigator.serviceWorker.register('./service-worker.js').catch(()=>{}); }
if(loggedIn()) unlockApp(); else renderLogin();
</script>
</body>
</html>
